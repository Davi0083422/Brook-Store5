<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script>emailjs.init("GELM_vuWtLrQXSsMn");</script>
    <title>BROOK STORE | OFICIAL</title>
    <style>
        body { background: #0a0514; color: white; font-family: sans-serif; }
        .card-prod { background: #130a24; border: 1px solid #2d1b4d; border-radius: 20px; padding: 15px; transition: 0.3s; }
        .img-fix { width: 100%; height: 160px; object-fit: cover; border-radius: 12px; margin-bottom: 12px; border: 1px solid #333; }
        .shopify-btn { background: #7c3aed; color: white; font-weight: 800; border-radius: 8px; cursor: pointer; border: none; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <header class="p-6 border-b border-purple-900/30 flex justify-between items-center max-w-6xl mx-auto">
        <h1 onclick="location.reload()" class="text-xl font-black italic text-purple-500 cursor-pointer uppercase">BROOK STORE</h1>
        <div class="relative p-2 bg-purple-900/20 border border-purple-500/40 rounded-lg">
            <i data-lucide="shopping-bag"></i>
        </div>
    </header>

    <main id="home-page" class="max-w-6xl mx-auto px-6 py-10">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-6" id="products-grid"></div>
        
        <div class="mt-20 border-t border-purple-900/30 pt-10">
            <h2 class="text-center text-2xl font-black mb-10 italic uppercase text-purple-400">Avaliações</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-[#130a24] p-6 rounded-2xl border border-purple-900/50">
                    <p class="italic text-gray-300">"Melhor xit que já usei, suporte do Davi é 10!"</p>
                    <p class="mt-4 font-bold text-purple-500">- @player_ff</p>
                </div>
                <div class="bg-[#130a24] p-6 rounded-2xl border border-purple-900/50">
                    <p class="italic text-gray-300">"O painel da barbie é apelão demais."</p>
                    <p class="mt-4 font-bold text-purple-500">- @vini_pro</p>
                </div>
            </div>
        </div>
    </main>

    <div id="register-page" class="hidden max-w-md mx-auto px-4 py-20 text-center">
        <div class="bg-[#130a24] p-8 rounded-3xl border border-purple-500">
            <h2 class="text-xl font-black mb-6 uppercase text-purple-400">Criar Conta</h2>
            <input id="reg-email" type="email" placeholder="Seu Gmail" class="w-full p-4 rounded-xl mb-4 bg-black border border-purple-900 text-white outline-none">
            <button onclick="irParaPagamento()" class="w-full shopify-btn py-4 uppercase italic">Continuar</button>
        </div>
    </div>

    <div id="checkout-page" class="hidden max-w-md mx-auto px-4 py-10 text-center">
        <div class="bg-[#130a24] p-8 rounded-3xl border border-purple-500">
            <h2 class="text-lg font-bold mb-4 italic">PAGAMENTO PIX</h2>
            <div id="qr-area" class="bg-white p-4 rounded-xl mb-6 inline-block"></div>
            
            <div class="mb-6">
                <p class="text-[10px] text-gray-400 mb-2 uppercase italic">Chave Pix (Celular):</p>
                <div class="flex items-center bg-black/50 p-3 rounded-lg border border-purple-900">
                    <input id="pix-key" type="text" value="24999582173" readonly class="bg-transparent w-full text-center font-bold text-purple-400 outline-none">
                    <button onclick="copyPix()" class="ml-2 text-purple-500"><i data-lucide="copy"></i></button>
                </div>
            </div>

            <button id="btn-finalizar" onclick="enviarPedido()" class="w-full bg-blue-600 py-4 rounded-xl font-bold uppercase">JÁ PAGUEI!</button>
        </div>
    </div>

    <script>
        let emailCliente = "";
        let produtoSelecionado = "";
        const minhaChavePix = "24999582173";

        const prods = [
            {n: 'Painel da Barbie', v: 5.00, i: 'painel barbie.png'},
            {n: 'Holograma V2', v: 1.00, i: 'holograma v2.jpg'},
            {n: 'Painel Dark Aura', v: 6.99, i: 'painel dark aura.jpg'},
            {n: 'Atalho Full V4', v: 2.99, i: 'Atalho full v4 ISO.jpg'},
            {n: 'Auxílio iOS/Android', v: 4.99, i: 'Auxilio Sleep.jpg'},
            {n: 'Painel FFH4X', v: 3.50, i: 'painel Uriel Xiter.jpg'},
            {n: 'Holograma HS Pescoço', v: 9.99, i: 'hpçpgrama hs pescoço.jpg'}
        ];

        function renderProducts() {
            document.getElementById('products-grid').innerHTML = prods.map(p => `
                <div class="card-prod flex flex-col">
                    <img src="${p.i}" class="img-fix" onerror="this.src='https://placehold.co/400x300/130a24/7c3aed?text=BROOK'">
                    <h3 class="text-[10px] font-black uppercase mb-1 italic truncate">${p.n}</h3>
                    <p class="text-purple-400 font-black mb-4">R$ ${p.v.toFixed(2)}</p>
                    <button onclick="escolherProduto('${p.n}')" class="w-full shopify-btn py-3 text-[10px] uppercase italic">Comprar</button>
                </div>`).join('');
        }

        function escolherProduto(nome) {
            produtoSelecionado = nome;
            document.getElementById('home-page').classList.add('hidden');
            document.getElementById('register-page').classList.remove('hidden');
        }

        function irParaPagamento() {
            emailCliente = document.getElementById('reg-email').value;
            if(!emailCliente.includes('@')) return Swal.fire('Erro', 'Gmail inválido!', 'error');
            document.getElementById('register-page').classList.add('hidden');
            document.getElementById('checkout-page').classList.remove('hidden');
            document.getElementById('qr-area').innerHTML = `<img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${minhaChavePix}">`;
        }

        function copyPix() {
            const pixInput = document.getElementById('pix-key');
            pixInput.select();
            document.execCommand('copy');
            Swal.fire({ title: 'COPIADO!', text: 'Chave Pix copiada.', icon: 'success', timer: 1000, showConfirmButton: false });
        }

        function enviarPedido() {
            let codigoGerado = "BROOK" + Math.floor(Math.random() * 8999 + 1000);
            document.getElementById('btn-finalizar').innerText = "ENVIANDO...";

            // SINCRONIZADO COM O TEMPLATE ID: template_pi9wl0p
            emailjs.send("service_uu69awn", "template_pi9wl0p", {
                v1: emailCliente,    // Gmail que o cliente digitou
                v2: produtoSelecionado, // Nome do produto que ele escolheu
                v3: codigoGerado     // Código BROOKXXXX que vai pro verifica.html
            }).then(() => {
                Swal.fire({
                    title: 'SUCESSO!',
                    html: `Seu código foi enviado ao Gmail!<br><br><b>Acesse brook-store.vercel.app/verificar.html para ativar seu produto!</b>`,
                    icon: 'success',
                    background: '#130a24', color: '#fff'
                });
                document.getElementById('btn-finalizar').innerText = "JÁ PAGUEI!";
            }).catch((err) => {
                alert("Erro no envio do Template!");
                document.getElementById('btn-finalizar').innerText = "JÁ PAGUEI!";
            });
        }

        window.onload = () => { renderProducts(); lucide.createIcons(); };
    </script>
</body>
</html>
